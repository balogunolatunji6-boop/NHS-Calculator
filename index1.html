<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title> Modern Calculator </title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: "Segoe UI", sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(173deg,white 40%, black 40%);
}

/* Calculator Card */
.calculator{
    width:300px;
    background:#121212;
    border-radius:25px;
    padding:20px;
    box-shadow:0 20px 40px rgba(0,0,0,0.6);
    position:relative;
}

/* Display */
.display{
    color:#fff;
    text-align:right;
    margin-bottom:20px;
}

.display .history{
    font-size:14px;
    opacity:0.5;
}

.display .result{
    font-size:40px;
    font-weight:600;
}

/* Buttons Grid */
.buttons{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:15px;
}

/* Button Style */
button{
    height:55px;
    border:none;
    border-radius:15px;
    font-size:18px;
    cursor:pointer;
    transition:0.2s ease;
}

button:hover{
    transform:scale(1.05);
}

/* Number Buttons */
.number{
    background:#1e1e1e;
    color:#fff;
}

/* Operator Buttons */
.operator{
    background:#2a2a2a;
    color:#f5b400;
}

/* Equal Button */
.equal{
    background:white;
    color:#000;
    grid-column: span 2;
    font-weight:bold;
}

/* AC Button */
.clear{
    background:#333;
    color:#ff5c5c;
}

/* Side Yellow Accent */
.calculator::before{
    content:"";
    position:absolute;
    left:0;
    top:120px;
    height:200px;
    width:10px;
    background:white;
    border-radius:0 10px 10px 0;
}
</style>
</head>

<body>

<div class="calculator">

    <div class="display">
        <div class="history"></div>
        <div class="result">0</div>
    </div>

    <div class="buttons">
        <button class="clear">AC</button>
        <button class="operator">%</button>
        <button class="operator">÷</button>
        <button class="operator">×</button>

        <button class="number">7</button>
        <button class="number">8</button>
        <button class="number">9</button>
        <button class="operator">−</button>

        <button class="number">4</button>
        <button class="number">5</button>
        <button class="number">6</button>
        <button class="operator">+</button>

        <button class="number">1</button>
        <button class="number">2</button>
        <button class="number">3</button>
        <button class="equal">=</button>

        <button class="number">0</button>
        <button class="number">.</button>
    </div>

</div>

</body>
</html>
